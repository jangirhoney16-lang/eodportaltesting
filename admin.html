<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOD Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5; --card: #fff; --border: #e4e7ec;
      --text: #111827; --muted: #6b7280;
      --accent: #1a1a2e; --accent2: #16213e;
      --green: #16a34a; --red: #dc2626;
      --blue: #2563eb; --yellow: #d97706;
      --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; }
    .navbar { background: var(--accent); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .navbar-brand { font-size: 15px; font-weight: 600; color: #fff; }
    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-email { font-size: 12px; color: rgba(255,255,255,0.6); }
    .logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
    .main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat-card { background: var(--bg); border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-val { font-size: 26px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
    .chart-wrap { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:hover td { background: var(--bg); }
    .badge-green { background: #f0fdf4; color: var(--green); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-red { background: #fef2f2; color: var(--red); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    select, input[type="date"] { height: 38px; padding: 0 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); outline: none; }
    .range-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 8px; width: fit-content; margin-bottom: 12px; }
    .range-btn { padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .range-btn.active { background: var(--accent); color: #fff; }
    .range-btn:hover:not(.active) { background: var(--border); color: var(--text); }
    .custom-range { display: none; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .custom-range.show { display: flex; }
    .chart-section-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="navbar-brand">EOD Admin Panel</span>
  <div class="navbar-right">
    <span class="navbar-email" id="navEmail"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">

  <!-- STATS -->
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Employees</div><div class="stat-val" id="statEmp">—</div></div>
    <div class="stat-card"><div class="stat-label">Today's Submissions</div><div class="stat-val" id="statToday">—</div></div>
    <div class="stat-card"><div class="stat-label">Cases Today</div><div class="stat-val" id="statCasesToday">—</div></div>
    <div class="stat-card"><div class="stat-label">Pending Today</div><div class="stat-val" style="color:var(--red)" id="statPending">—</div></div>
    <div class="stat-card"><div class="stat-label">Technical Today</div><div class="stat-val" style="color:var(--blue)" id="statTech">—</div></div>
    <div class="stat-card"><div class="stat-label">Medical Today</div><div class="stat-val" style="color:var(--green)" id="statMed">—</div></div>
    <div class="stat-card"><div class="stat-label">Cashless Today</div><div class="stat-val" style="color:var(--yellow)" id="statCash">—</div></div>
  </div>

  <!-- CHART CARD -->
  <div class="card">
    <div class="card-title">Team Performance</div>

    <!-- Range Tabs -->
    <div class="range-tabs">
      <button class="range-btn active" onclick="setRange('week', this)">This Week</button>
      <button class="range-btn" onclick="setRange('month', this)">This Month</button>
      <button class="range-btn" onclick="setRange('year',  this)">This Year</button>
      <button class="range-btn" onclick="setRange('custom',this)">Custom</button>
    </div>

    <!-- Custom Range -->
    <div class="custom-range" id="customRange">
      <span style="font-size:13px;color:var(--muted);">From</span>
      <input type="date" id="chartFrom" onchange="renderChart()">
      <span style="font-size:13px;color:var(--muted);">To</span>
      <input type="date" id="chartTo" onchange="renderChart()">
    </div>

    <!-- View Toggle -->
    <div style="display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:8px;width:fit-content;margin-bottom:16px;">
      <button class="range-btn active" id="view-total"   onclick="setView('total',   this)">Total</button>
      <button class="range-btn"        id="view-distrib" onclick="setView('distrib', this)">Fresh & Rework</button>
    </div>

    <!-- Total Chart -->
    <div id="chartTotalWrap">
      <div class="chart-wrap"><canvas id="adminChart"></canvas></div>
    </div>

    <!-- Fresh & Rework Charts -->
    <div id="chartDistribWrap" style="display:none;">
      <div class="chart-section-label">Fresh Cases</div>
      <div class="chart-wrap"><canvas id="chartFresh"></canvas></div>
      <div style="height:24px;"></div>
      <div class="chart-section-label">Rework Cases</div>
      <div class="chart-wrap"><canvas id="chartRework"></canvas></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="card-title">All Entries</div>
    <div class="filter-row">
      <select id="filterEmployee" onchange="renderTable()"><option value="">All Employees</option></select>
      <select id="filterTeam" onchange="renderTable()">
        <option value="">All Teams</option>
        <option value="technical">Technical</option>
        <option value="medical">Medical</option>
        <option value="cashless">Cashless</option>
      </select>
      <input type="date" id="filterFrom" onchange="renderTable()">
      <input type="date" id="filterTo"   onchange="renderTable()">
    </div>
    <div style="overflow-x:auto; overflow-y:auto; max-height:500px;">
      <table>
        <thead>
          <tr><th>Date</th><th>Name</th><th>Team</th><th>Fresh</th><th>Rework</th><th>Total</th><th>Target</th><th>Deficit</th><th>Reason</th></tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="9" style="text-align:center;padding:20px;color:var(--muted);">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyB53EbCi3m1n5L1xReV8JExc_zoaQFe21Y",
    authDomain:        "daily-eod--count-portal.firebaseapp.com",
    projectId:         "daily-eod--count-portal",
    storageBucket:     "daily-eod--count-portal.firebasestorage.app",
    messagingSenderId: "665878833615",
    appId:             "1:665878833615:web:3ef734d845a531b7874aba",
    measurementId:     "G-9DTPC5WSN3"
  };

  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfu0eMO37-tJ4rWZ7-HlIq16yS49nmVGHHO6XoenSRNl351FryI1jBk5s0ICbHIUw4zQ/exec";

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let currentUser  = null;
  let allEntries   = [];
  let allEmployees = [];
  let adminChart   = null;
  let chartFresh   = null;
  let chartRework  = null;
  let currentRange = 'week';
  let currentView  = 'total';

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    currentUser = user;
    document.getElementById('navEmail').textContent = user.email;
    await loadAdminData();
  });

  window.logout = async function() {
    await signOut(auth);
    window.location.href = "index.html";
  };

  async function loadAdminData() {
    try {
      const url1  = APPS_SCRIPT_URL + "?action=getUser&email=" + encodeURIComponent(currentUser.email);
      const res1  = await fetch(url1);
      const user  = await res1.json();
      if (user.role !== "Admin") { alert("Access denied"); window.location.href = "index.html"; return; }

      const url2  = APPS_SCRIPT_URL + "?action=getAllEntries&email=" + encodeURIComponent(currentUser.email);
      const res2  = await fetch(url2);
      const data2 = await res2.json();
      // Normalize all dates at load time — fixes chart matching
      allEntries   = (data2.entries   || []).map(e => ({...e, date: normalizeDate(e.date)}));
      allEmployees = data2.employees || [];

      renderStats();
      renderChart();
      renderTable();
      populateFilter();
    } catch(e) {
      alert("Error: " + e.message);
    }
  }

  function getTodayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function matchTeam(entry, team) {
    return String(entry.team).toLowerCase().includes(team.toLowerCase());
  }

  function getFilteredEntries() {
    const empFilter  = document.getElementById('filterEmployee').value;
    const teamFilter = document.getElementById('filterTeam').value;
    const fromFilter = document.getElementById('filterFrom').value;
    const toFilter   = document.getElementById('filterTo').value;
    return allEntries.filter(e => {
      const d = String(e.date).substring(0,10);
      if (empFilter  && e.name !== empFilter)      return false;
      if (teamFilter && !matchTeam(e, teamFilter)) return false;
      if (fromFilter && d < fromFilter)            return false;
      if (toFilter   && d > toFilter)              return false;
      return true;
    });
  }

  function renderStats() {
    const today    = getTodayStr();
    const todayEnt = allEntries.filter(e => String(e.date).substring(0,10) === today);
    const empCount = allEmployees.filter(e => String(e.role) !== 'Admin').length;
    document.getElementById('statEmp').textContent        = empCount;
    document.getElementById('statToday').textContent      = todayEnt.length;
    document.getElementById('statCasesToday').textContent = todayEnt.reduce((s,e)=>s+parseInt(e.total),0);
    document.getElementById('statPending').textContent    = Math.max(0, empCount - todayEnt.length);
    document.getElementById('statTech').textContent       = todayEnt.filter(e=>matchTeam(e,'technical')).reduce((s,e)=>s+parseInt(e.total),0);
    document.getElementById('statMed').textContent        = todayEnt.filter(e=>matchTeam(e,'medical')).reduce((s,e)=>s+parseInt(e.total),0);
    document.getElementById('statCash').textContent       = todayEnt.filter(e=>matchTeam(e,'cashless')).reduce((s,e)=>s+parseInt(e.total),0);
  }

  window.setRange = function(range, btn) {
    currentRange = range;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // restore view toggle active state
    document.getElementById('view-' + currentView).classList.add('active');
    const cd = document.getElementById('customRange');
    if (range === 'custom') {
      cd.classList.add('show');
      const now  = new Date();
      const from = new Date(now);
      from.setDate(from.getDate() - 30);
      document.getElementById('chartFrom').value = from.toISOString().split('T')[0];
      document.getElementById('chartTo').value   = now.toISOString().split('T')[0];
    } else {
      cd.classList.remove('show');
    }
    renderChart();
  };

  window.setView = function(view, btn) {
    currentView = view;
    document.getElementById('view-total').classList.remove('active');
    document.getElementById('view-distrib').classList.remove('active');
    btn.classList.add('active');
    document.getElementById('chartTotalWrap').style.display   = view === 'total'   ? 'block' : 'none';
    document.getElementById('chartDistribWrap').style.display = view === 'distrib' ? 'block' : 'none';
    renderChart();
  };

  function buildDateRange() {
    const now = new Date();
    let fromDate, toDate;
    if (currentRange === 'week') {
      const diff = now.getDay() === 0 ? 6 : now.getDay() - 1;
      fromDate = new Date(now); fromDate.setDate(now.getDate() - diff);
      toDate   = new Date(now);
    } else if (currentRange === 'month') {
      fromDate = new Date(now.getFullYear(), now.getMonth(), 1);
      toDate   = new Date(now);
    } else if (currentRange === 'year') {
      fromDate = new Date(now.getFullYear(), 0, 1);
      toDate   = new Date(now);
    } else {
      const f = document.getElementById('chartFrom').value;
      const t = document.getElementById('chartTo').value;
      if (!f || !t) return null;
      fromDate = new Date(f); toDate = new Date(t);
    }
    const days = [];
    const cur  = new Date(fromDate);
    while (cur <= toDate) { days.push(cur.toISOString().split('T')[0]); cur.setDate(cur.getDate()+1); }
    return days;
  }

  function buildChartData(days, filteredEntries) {
    let labels=[];
    let techTotal=[], medTotal=[], cashTotal=[];
    let techFresh=[], medFresh=[], cashFresh=[];
    let techRework=[], medRework=[], cashRework=[];
    let targetData=[];

    if (days.length <= 35) {
      labels = days.map(d => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}));
      days.forEach(d => {
        const de = filteredEntries.filter(e => String(e.date).substring(0,10) === d);
        techTotal.push(de.filter(e=>matchTeam(e,'technical')).reduce((s,e)=>s+parseInt(e.total),0));
        medTotal.push(de.filter(e=>matchTeam(e,'medical')).reduce((s,e)=>s+parseInt(e.total),0));
        cashTotal.push(de.filter(e=>matchTeam(e,'cashless')).reduce((s,e)=>s+parseInt(e.total),0));
        techFresh.push(de.filter(e=>matchTeam(e,'technical')).reduce((s,e)=>s+parseInt(e.fresh),0));
        medFresh.push(de.filter(e=>matchTeam(e,'medical')).reduce((s,e)=>s+parseInt(e.fresh),0));
        cashFresh.push(de.filter(e=>matchTeam(e,'cashless')).reduce((s,e)=>s+parseInt(e.fresh),0));
        techRework.push(de.filter(e=>matchTeam(e,'technical')).reduce((s,e)=>s+parseInt(e.rework),0));
        medRework.push(de.filter(e=>matchTeam(e,'medical')).reduce((s,e)=>s+parseInt(e.rework),0));
        cashRework.push(de.filter(e=>matchTeam(e,'cashless')).reduce((s,e)=>s+parseInt(e.rework),0));
        const emails = [...new Set(de.map(e=>e.email))];
        targetData.push(emails.reduce((sum,email) => {
          const emp = allEmployees.find(em=>String(em.email).toLowerCase()===String(email).toLowerCase());
          return sum + (parseInt(emp?.target)||0);
        }, 0));
      });
    } else {
      const months = {};
      days.forEach(d => { const k=d.substring(0,7); if(!months[k]) months[k]=[]; months[k].push(d); });
      Object.entries(months).forEach(([key, mDays]) => {
        labels.push(new Date(key+'-01').toLocaleDateString('en-IN',{month:'short',year:'numeric'}));
        const me = filteredEntries.filter(e=>mDays.includes(String(e.date).substring(0,10)));
        techTotal.push(me.filter(e=>matchTeam(e,'technical')).reduce((s,e)=>s+parseInt(e.total),0));
        medTotal.push(me.filter(e=>matchTeam(e,'medical')).reduce((s,e)=>s+parseInt(e.total),0));
        cashTotal.push(me.filter(e=>matchTeam(e,'cashless')).reduce((s,e)=>s+parseInt(e.total),0));
        techFresh.push(me.filter(e=>matchTeam(e,'technical')).reduce((s,e)=>s+parseInt(e.fresh),0));
        medFresh.push(me.filter(e=>matchTeam(e,'medical')).reduce((s,e)=>s+parseInt(e.fresh),0));
        cashFresh.push(me.filter(e=>matchTeam(e,'cashless')).reduce((s,e)=>s+parseInt(e.fresh),0));
        techRework.push(me.filter(e=>matchTeam(e,'technical')).reduce((s,e)=>s+parseInt(e.rework),0));
        medRework.push(me.filter(e=>matchTeam(e,'medical')).reduce((s,e)=>s+parseInt(e.rework),0));
        cashRework.push(me.filter(e=>matchTeam(e,'cashless')).reduce((s,e)=>s+parseInt(e.rework),0));
        const mt = mDays.reduce((total,d) => {
          const de = filteredEntries.filter(e=>String(e.date).substring(0,10)===d);
          const emails = [...new Set(de.map(e=>e.email))];
          return total + emails.reduce((sum,email) => {
            const emp = allEmployees.find(em=>String(em.email).toLowerCase()===String(email).toLowerCase());
            return sum+(parseInt(emp?.target)||0);
          },0);
        },0);
        targetData.push(mt);
      });
    }

    return { labels, techTotal, medTotal, cashTotal, techFresh, medFresh, cashFresh, techRework, medRework, cashRework, targetData };
  }

  function normalizeDate(raw) {
    if (!raw) return "";
    try {
      if (typeof raw === 'object' && raw instanceof Date) {
        const y=raw.getFullYear(), m=String(raw.getMonth()+1).padStart(2,'0'), d=String(raw.getDate()).padStart(2,'0');
        return y+'-'+m+'-'+d;
      }
      const s = String(raw).trim();
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);
      const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (dmy) return dmy[3]+'-'+dmy[2].padStart(2,'0')+'-'+dmy[1].padStart(2,'0');
      const d = new Date(raw);
      if (!isNaN(d)) { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+dd; }
    } catch(_) {}
    return String(raw).substring(0,10);
  }

  function renderChart() {
    // Chart syncs with employee + team filters from table, but uses its OWN date range
    const empFilter  = document.getElementById('filterEmployee').value;
    const teamFilter = document.getElementById('filterTeam').value;
    const ROSTER     = ['Leave','Sat Off','Comp Off','Half Day','Absent','Holiday'];
    const chartEntries = allEntries.filter(e => {
      if (empFilter  && e.name !== empFilter)       return false;
      if (teamFilter && !matchTeam(e, teamFilter))  return false;
      if (ROSTER.includes(String(e.reason||'').trim())) return false; // exclude roster from chart
      return true;
    });
    const days = buildDateRange();
    if (!days) return;
    const d = buildChartData(days, chartEntries);

    const targetDataset = {
      label: 'Team Target',
      data: d.targetData,
      type: 'line',
      borderColor: '#dc2626',
      borderWidth: 2.5,
      borderDash: [6,3],
      pointRadius: 4,
      pointBackgroundColor: '#dc2626',
      fill: false,
      order: 1,
      stack: undefined
    };

    const commonOptions = {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:true, labels:{ usePointStyle:true, font:{size:12} } } },
      scales: {
        x: { stacked:true, grid:{display:false}, ticks:{font:{size:11}} },
        y: { stacked:true, beginAtZero:true, grid:{color:'#f0f0f0'}, ticks:{font:{size:11}} }
      }
    };

    if (currentView === 'total') {
      if (adminChart) adminChart.destroy();
      adminChart = new Chart(document.getElementById('adminChart'), {
        type: 'bar',
        data: {
          labels: d.labels,
          datasets: [
            { label:'Technical', data:d.techTotal, backgroundColor:'#3b82f6', borderRadius:4, stack:'cases', order:2 },
            { label:'Medical',   data:d.medTotal,  backgroundColor:'#4ade80', borderRadius:4, stack:'cases', order:2 },
            { label:'Cashless',  data:d.cashTotal, backgroundColor:'#f59e0b', borderRadius:4, stack:'cases', order:2 },
            targetDataset
          ]
        },
        options: {
          ...commonOptions,
          plugins: {
            ...commonOptions.plugins,
            tooltip: {
              callbacks: {
                afterBody: function(context) {
                  const idx   = context[0].dataIndex;
                  const total = (d.techTotal[idx]||0)+(d.medTotal[idx]||0)+(d.cashTotal[idx]||0);
                  const tgt   = d.targetData[idx];
                  if (tgt===0) return 'Total: '+total;
                  const diff  = total-tgt;
                  if (diff>=0) return 'Total: '+total+'\n✓ Above by '+diff;
                  return 'Total: '+total+'\n✗ Short by '+Math.abs(diff);
                }
              }
            }
          }
        }
      });

    } else {
      if (chartFresh) chartFresh.destroy();
      chartFresh = new Chart(document.getElementById('chartFresh'), {
        type: 'bar',
        data: {
          labels: d.labels,
          datasets: [
            { label:'Technical Fresh', data:d.techFresh, backgroundColor:'#3b82f6', borderRadius:4, stack:'fresh', order:2 },
            { label:'Medical Fresh',   data:d.medFresh,  backgroundColor:'#4ade80', borderRadius:4, stack:'fresh', order:2 },
            { label:'Cashless Fresh',  data:d.cashFresh, backgroundColor:'#f59e0b', borderRadius:4, stack:'fresh', order:2 },
            targetDataset
          ]
        },
        options: commonOptions
      });

      if (chartRework) chartRework.destroy();
      chartRework = new Chart(document.getElementById('chartRework'), {
        type: 'bar',
        data: {
          labels: d.labels,
          datasets: [
            { label:'Technical Rework', data:d.techRework, backgroundColor:'#93c5fd', borderRadius:4, stack:'rework', order:2 },
            { label:'Medical Rework',   data:d.medRework,  backgroundColor:'#86efac', borderRadius:4, stack:'rework', order:2 },
            { label:'Cashless Rework',  data:d.cashRework, backgroundColor:'#fcd34d', borderRadius:4, stack:'rework', order:2 }
          ]
        },
        options: commonOptions
      });
    }
  }

  function renderTable() {
    const filtered = getFilteredEntries();
    const tbody = document.getElementById('tableBody');
    if (!filtered.length) {
      tbody.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:20px;">No entries found</td></tr>';
      renderChart();
      return;
    }
    tbody.innerHTML = filtered.map(e => {
      const deficit   = parseInt(e.deficit)||0;
      const teamColor = matchTeam(e,'technical')?'var(--blue)':matchTeam(e,'medical')?'var(--green)':'var(--yellow)';
      return `<tr>
        <td>${new Date(e.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</td>
        <td><strong>${e.name}</strong></td>
        <td><span style="color:${teamColor};font-weight:500;">${e.team}</span></td>
        <td>${e.fresh}</td><td>${e.rework}</td>
        <td><strong>${e.total}</strong></td>
        <td>${e.target||'—'}</td>
        <td>${deficit>0?`<span class="badge-red">${deficit}</span>`:`<span class="badge-green">0</span>`}</td>
        <td style="color:var(--muted)">${e.reason||'—'}</td>
      </tr>`;
    }).join('');
    renderChart();
  }

  window.renderTable = renderTable;

  function populateFilter() {
    const sel   = document.getElementById('filterEmployee');
    const names = [...new Set(allEntries.map(e=>e.name))].sort();
    names.forEach(n => { const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
  }

  // Auto refresh every 30 seconds
  setInterval(async () => {
    if (currentUser) {
      const url2  = APPS_SCRIPT_URL + "?action=getAllEntries&email=" + encodeURIComponent(currentUser.email);
      const res2  = await fetch(url2);
      const data2 = await res2.json();
      allEntries   = (data2.entries   || []).map(e => ({...e, date: normalizeDate(e.date)}));
      allEmployees = data2.employees || [];
      renderStats();
      renderChart();
      renderTable();
    }
  }, 30000);

</script>
</body>
</html>
