<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOD Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5; --card: #fff; --border: #e4e7ec;
      --text: #111827; --muted: #6b7280;
      --accent: #1a1a2e; --accent2: #16213e;
      --green: #16a34a; --red: #dc2626;
      --blue: #2563eb; --yellow: #d97706;
      --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; }
    .navbar { background: var(--accent); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .navbar-brand { font-size: 15px; font-weight: 600; color: #fff; }
    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-email { font-size: 12px; color: rgba(255,255,255,0.6); }
    .logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
    .logout-btn:hover { background: rgba(255,255,255,0.2); }
    .main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat-card { background: var(--bg); border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-val { font-size: 26px; font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }
    .chart-wrap { position: relative; height: 300px; margin-bottom: 20px; }
    .chart-container { position: relative; width: 100%; height: 300px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:hover td { background: var(--bg); }
    .badge-green { background: #f0fdf4; color: var(--green); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-red { background: #fef2f2; color: var(--red); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    select, input[type="date"] { height: 38px; padding: 0 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); }
    select:focus, input[type="date"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,26,46,0.08); }
    .range-tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 8px; width: fit-content; margin-bottom: 12px; }
    .range-btn { padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .range-btn.active { background: var(--accent); color: #fff; }
    .range-btn:hover:not(.active) { background: var(--border); color: var(--text); }
    .custom-range { display: none; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .custom-range.show { display: flex; }
    .chart-section-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .no-data { color: var(--muted); font-style: italic; padding: 20px; text-align: center; }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="navbar-brand">EOD Admin Panel</span>
  <div class="navbar-right">
    <span class="navbar-email" id="navEmail"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">

  <!-- STATS -->
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Employees</div><div class="stat-val" id="statEmp">—</div></div>
    <div class="stat-card"><div class="stat-label">Today's Submissions</div><div class="stat-val" id="statToday">—</div></div>
    <div class="stat-card"><div class="stat-label">Cases Today</div><div class="stat-val" id="statCasesToday">—</div></div>
    <div class="stat-card"><div class="stat-label">Pending Today</div><div class="stat-val" style="color:var(--red)" id="statPending">—</div></div>
    <div class="stat-card"><div class="stat-label">Technical Today</div><div class="stat-val" style="color:var(--blue)" id="statTech">—</div></div>
    <div class="stat-card"><div class="stat-label">Medical Today</div><div class="stat-val" style="color:var(--green)" id="statMed">—</div></div>
    <div class="stat-card"><div class="stat-label">Cashless Today</div><div class="stat-val" style="color:var(--yellow)" id="statCash">—</div></div>
  </div>

  <!-- CHART CARD -->
  <div class="card">
    <div class="card-title">Team Performance</div>

    <!-- Range Tabs -->
    <div class="range-tabs">
      <button class="range-btn active" onclick="setRange('week', this)">This Week</button>
      <button class="range-btn" onclick="setRange('month', this)">This Month</button>
      <button class="range-btn" onclick="setRange('year',  this)">This Year</button>
      <button class="range-btn" onclick="setRange('custom',this)">Custom</button>
    </div>

    <!-- Custom Range -->
    <div class="custom-range" id="customRange">
      <span style="font-size:13px;color:var(--muted);">From</span>
      <input type="date" id="chartFrom" onchange="renderChart()">
      <span style="font-size:13px;color:var(--muted);">To</span>
      <input type="date" id="chartTo" onchange="renderChart()">
    </div>

    <!-- View Toggle -->
    <div style="display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:8px;width:fit-content;margin-bottom:16px;">
      <button class="range-btn active" id="view-total"   onclick="setView('total',   this)">Total</button>
      <button class="range-btn"        id="view-distrib" onclick="setView('distrib', this)">Fresh & Rework</button>
    </div>

    <!-- Total Chart -->
    <div id="chartTotalWrap" style="position: relative; height: 300px;">
      <canvas id="chartTotal"></canvas>
    </div>

    <!-- Distribution Chart -->
    <div id="chartDistribWrap" style="display:none; position: relative; height: 300px;">
      <canvas id="chartDistrib"></canvas>
    </div>
  </div>

  <!-- TABLE CARD -->
  <div class="card">
    <div class="card-title">Entries List</div>
    <div class="filter-row">
      <select id="teamFilter" onchange="filterEntries()">
        <option value="">All Teams</option>
      </select>
      <input type="date" id="dateFilter" onchange="filterEntries()">
      <button style="padding: 7px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px;" onclick="filterEntries()">Filter</button>
    </div>
    <div style="overflow-x: auto;">
      <table id="entriesTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Employee</th>
            <th>Team</th>
            <th>Fresh</th>
            <th>Rework</th>
            <th>Total</th>
            <th>Target</th>
            <th>Deficit</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="9" class="no-data">Loading entries...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  // ── CONFIG ──
  const SCRIPT_URL = 'https://script.google.com/macros/d/1RlKqjLCwR9p5qb2K3ZF5xB9qB5xB9qC6eD7/usercontent/';
  var userEmail = '';
  var allEntries = [];
  var chartData = [];
  var teamData = [];
  var currentRange = 'week';
  var currentView = 'total';
  var chartInstance = null;

  // ── INIT ──
  window.onload = function() {
    userEmail = localStorage.getItem('userEmail');
    if (!userEmail) {
      window.location.href = 'index.html';
      return;
    }
    document.getElementById('navEmail').textContent = userEmail;
    loadData();
  };

  // ── LOAD DATA ──
  function loadData() {
    console.log('Loading admin data for:', userEmail);
    
    // Load stats and entries
    fetch(SCRIPT_URL + '?action=getAllEntries&email=' + encodeURIComponent(userEmail))
      .then(r => r.json())
      .then(data => {
        if (data.result === 'UNAUTHORIZED') {
          alert('Unauthorized: You are not an admin');
          logout();
          return;
        }
        allEntries = data.entries || [];
        console.log('Loaded entries:', allEntries.length);
        renderStats();
        renderTable();
        populateTeamFilter();
      })
      .catch(e => console.error('getAllEntries error:', e));

    // Load chart data
    loadChartData();
  }

  // ── LOAD CHART DATA ──
  function loadChartData() {
    var from = '', to = '';
    var now = new Date();

    if (currentRange === 'week') {
      var d = new Date(now);
      d.setDate(d.getDate() - 7);
      from = formatDateForAPI(d);
      to = formatDateForAPI(now);
    } else if (currentRange === 'month') {
      var d = new Date(now);
      d.setMonth(d.getMonth() - 1);
      from = formatDateForAPI(d);
      to = formatDateForAPI(now);
    } else if (currentRange === 'year') {
      var d = new Date(now);
      d.setFullYear(d.getFullYear() - 1);
      from = formatDateForAPI(d);
      to = formatDateForAPI(now);
    } else if (currentRange === 'custom') {
      from = document.getElementById('chartFrom').value;
      to = document.getElementById('chartTo').value;
      if (!from || !to) return;
    }

    var params = '?action=getChartData&email=' + encodeURIComponent(userEmail);
    if (from) params += '&from=' + from;
    if (to) params += '&to=' + to;

    fetch(SCRIPT_URL + params)
      .then(r => r.json())
      .then(data => {
        chartData = data.chartData || [];
        teamData = data.teamData || [];
        console.log('Chart data loaded:', chartData.length, 'dates,', teamData.length, 'teams');
        renderChart();
      })
      .catch(e => console.error('getChartData error:', e));
  }

  // ── RENDER STATS ──
  function renderStats() {
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    
    var todayEntries = allEntries.filter(e => {
      var d = new Date(e.date);
      d.setHours(0, 0, 0, 0);
      return d.getTime() === today.getTime();
    });

    var employees = new Set(allEntries.map(e => e.email));
    document.getElementById('statEmp').textContent = employees.size;
    document.getElementById('statToday').textContent = todayEntries.length;
    document.getElementById('statCasesToday').textContent = todayEntries.reduce((s, e) => s + e.total, 0);
    document.getElementById('statPending').textContent = todayEntries.reduce((s, e) => s + e.deficit, 0);
  }

  // ── RENDER TABLE ──
  function renderTable() {
    var tbody = document.getElementById('tableBody');
    if (allEntries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="no-data">No entries found</td></tr>';
      return;
    }
    var html = '';
    allEntries.forEach(e => {
      var deficitBadge = e.deficit > 0 ? '<span class="badge-red">' + e.deficit + '</span>' : '<span class="badge-green">✓</span>';
      html += '<tr><td>' + e.date + '</td><td>' + e.name + '</td><td>' + e.team + '</td><td>' + e.fresh + '</td><td>' + e.rework + '</td><td>' + e.total + '</td><td>' + e.target + '</td><td>' + deficitBadge + '</td><td>' + e.reason + '</td></tr>';
    });
    tbody.innerHTML = html;
  }

  // ── POPULATE TEAM FILTER ──
  function populateTeamFilter() {
    var teams = [...new Set(allEntries.map(e => e.team))];
    var select = document.getElementById('teamFilter');
    teams.forEach(team => {
      var opt = document.createElement('option');
      opt.value = team;
      opt.textContent = team;
      select.appendChild(opt);
    });
  }

  // ── FILTER ENTRIES ──
  function filterEntries() {
    var team = document.getElementById('teamFilter').value;
    var date = document.getElementById('dateFilter').value;
    
    var filtered = allEntries.filter(e => {
      if (team && e.team !== team) return false;
      if (date && e.date !== date) return false;
      return true;
    });

    var tbody = document.getElementById('tableBody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="no-data">No matching entries</td></tr>';
      return;
    }
    var html = '';
    filtered.forEach(e => {
      var deficitBadge = e.deficit > 0 ? '<span class="badge-red">' + e.deficit + '</span>' : '<span class="badge-green">✓</span>';
      html += '<tr><td>' + e.date + '</td><td>' + e.name + '</td><td>' + e.team + '</td><td>' + e.fresh + '</td><td>' + e.rework + '</td><td>' + e.total + '</td><td>' + e.target + '</td><td>' + deficitBadge + '</td><td>' + e.reason + '</td></tr>';
    });
    tbody.innerHTML = html;
  }

  // ── SET RANGE ──
  function setRange(range, btn) {
    currentRange = range;
    document.querySelectorAll('.range-tabs .range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    if (range === 'custom') {
      document.getElementById('customRange').classList.add('show');
      if (!document.getElementById('chartFrom').value) {
        var today = new Date();
        document.getElementById('chartTo').value = formatDateForInput(today);
        var weekAgo = new Date(today);
        weekAgo.setDate(weekAgo.getDate() - 7);
        document.getElementById('chartFrom').value = formatDateForInput(weekAgo);
      }
    } else {
      document.getElementById('customRange').classList.remove('show');
      loadChartData();
    }
  }

  // ── SET VIEW ──
  function setView(view, btn) {
    currentView = view;
    document.querySelectorAll('[id^="view-"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    if (view === 'total') {
      document.getElementById('chartTotalWrap').style.display = 'relative';
      document.getElementById('chartDistribWrap').style.display = 'none';
    } else {
      document.getElementById('chartTotalWrap').style.display = 'none';
      document.getElementById('chartDistribWrap').style.display = 'relative';
    }
    renderChart();
  }

  // ── RENDER CHART ──
  function renderChart() {
    if (!chartData || chartData.length === 0) {
      console.warn('No chart data available');
      if (currentView === 'total') {
        document.getElementById('chartTotalWrap').innerHTML = '<div class="no-data">No data available for the selected period</div>';
      } else {
        document.getElementById('chartDistribWrap').innerHTML = '<div class="no-data">No data available for the selected period</div>';
      }
      return;
    }

    if (currentView === 'total') {
      renderTotalChart();
    } else {
      renderDistributionChart();
    }
  }

  // ── RENDER TOTAL CHART ──
  function renderTotalChart() {
    var ctx = document.getElementById('chartTotal');
    if (!ctx) return;

    var dates = chartData.map(d => d.date);
    var totals = chartData.map(d => d.total || 0);

    if (chartInstance) {
      chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: dates,
        datasets: [{
          label: 'Total Cases',
          data: totals,
          backgroundColor: '#2563eb',
          borderColor: '#1e40af',
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'bottom' },
          title: { display: false }
        },
        scales: {
          y: { beginAtZero: true, min: 0, ticks: { stepSize: 1 } }
        }
      }
    });
  }

  // ── RENDER DISTRIBUTION CHART ──
  function renderDistributionChart() {
    var ctx = document.getElementById('chartDistrib');
    if (!ctx) return;

    var dates = chartData.map(d => d.date);
    var fresh = chartData.map(d => d.fresh || 0);
    var rework = chartData.map(d => d.rework || 0);

    if (chartInstance) {
      chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: dates,
        datasets: [
          {
            label: 'Fresh',
            data: fresh,
            backgroundColor: '#16a34a',
            borderRadius: 4
          },
          {
            label: 'Rework',
            data: rework,
            backgroundColor: '#dc2626',
            borderRadius: 4
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'bottom' }
        },
        scales: {
          x: { stacked: false },
          y: { beginAtZero: true, min: 0, ticks: { stepSize: 1 } }
        }
      }
    });
  }

  // ── UTILITIES ──
  function formatDateForAPI(date) {
    var y = date.getFullYear();
    var m = String(date.getMonth() + 1).padStart(2, '0');
    var d = String(date.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  function formatDateForInput(date) {
    return formatDateForAPI(date);
  }

  function logout() {
    localStorage.removeItem('userEmail');
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
